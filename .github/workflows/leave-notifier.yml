name: Leave Notifier

on:
  schedule:
    # 09:00 Asia/Kolkata = 03:30 UTC
    - cron: '30 3 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: leave-notifier
  cancel-in-progress: false

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run notifier
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GCAL_CALENDAR_ID: primary
          LEAVE_MESSAGE: "FYI: I’ll be on leave tomorrow."
          STATE_PATH: .state/leave_notifier.json
        run: |
          python scripts/leave_notifier.py

      - name: Commit state (dedupe)
        run: |
          if [ -f .state/leave_notifier.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .state/leave_notifier.json
            git diff --cached --quiet || git commit -m "chore: update leave notifier state"
            git push
          fi
